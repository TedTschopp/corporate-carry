<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 4px; }
  .row { display: grid; grid-template-columns: 90px 1fr; gap: 18px; align-items: center; }
  .lbl { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink); letter-spacing: 0.04em; }
  .lbl .v { color: var(--ink-mute); display: inline-block; margin-left: 6px; }
  .bar { height: 18px; background: var(--accent-tint); border-left: 2px solid var(--accent); }
</style></head>
<body>
<div class="card card--tight">
  <div class="eyebrow"><span class="num">§</span> Spacing scale</div>
  <div class="stack">
    <div class="row"><div class="lbl">space-1 <span class="v">4</span></div><div class="bar" style="width: 4px;"></div></div>
    <div class="row"><div class="lbl">space-2 <span class="v">8</span></div><div class="bar" style="width: 8px;"></div></div>
    <div class="row"><div class="lbl">space-3 <span class="v">12</span></div><div class="bar" style="width: 12px;"></div></div>
    <div class="row"><div class="lbl">space-4 <span class="v">16</span></div><div class="bar" style="width: 16px;"></div></div>
    <div class="row"><div class="lbl">space-5 <span class="v">24</span></div><div class="bar" style="width: 24px;"></div></div>
    <div class="row"><div class="lbl">space-6 <span class="v">32</span></div><div class="bar" style="width: 32px;"></div></div>
    <div class="row"><div class="lbl">space-7 <span class="v">48</span></div><div class="bar" style="width: 48px;"></div></div>
    <div class="row"><div class="lbl">space-8 <span class="v">72 · section</span></div><div class="bar" style="width: 72px;"></div></div>
  </div>
  <div class="note">Page wrap is 1320 max with 32px outer padding. Section rhythm is 72px (compact: 54, roomy: 86).</div>
</div>
</body></html>
