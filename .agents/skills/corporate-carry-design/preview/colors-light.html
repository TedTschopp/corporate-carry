<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .swatch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .sw { display: flex; flex-direction: column; }
  .sw__chip { aspect-ratio: 1.6 / 1; border: 1px solid var(--hairline); border-radius: var(--radius-sm); }
  .sw__name { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink); margin-top: 6px; letter-spacing: 0.02em; }
  .sw__hex { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.02em; }
</style></head>
<body>
<div class="card card--tight">
  <div class="eyebrow"><span class="num">§</span> Light surfaces & ink</div>
  <div class="swatch-grid">
    <div class="sw"><div class="sw__chip" style="background:#f6f1e6;"></div><div class="sw__name">bg</div><div class="sw__hex">#f6f1e6</div></div>
    <div class="sw"><div class="sw__chip" style="background:#efe8d6;"></div><div class="sw__name">bg-soft</div><div class="sw__hex">#efe8d6</div></div>
    <div class="sw"><div class="sw__chip" style="background:#fbf7ec;"></div><div class="sw__name">surface</div><div class="sw__hex">#fbf7ec</div></div>
    <div class="sw"><div class="sw__chip" style="background:#fffdf6;"></div><div class="sw__name">paper</div><div class="sw__hex">#fffdf6</div></div>
    <div class="sw"><div class="sw__chip" style="background:#1a1614;"></div><div class="sw__name">ink</div><div class="sw__hex">#1a1614</div></div>
    <div class="sw"><div class="sw__chip" style="background:#2c2722;"></div><div class="sw__name">ink-2</div><div class="sw__hex">#2c2722</div></div>
    <div class="sw"><div class="sw__chip" style="background:#5d564d;"></div><div class="sw__name">ink-soft</div><div class="sw__hex">#5d564d</div></div>
    <div class="sw"><div class="sw__chip" style="background:#8a8275;"></div><div class="sw__name">ink-mute</div><div class="sw__hex">#8a8275</div></div>
  </div>
  <div class="note">Warm cream + warm black. Greys carry yellow undertones so they sit on cream without going grey-blue.</div>
</div>
</body></html>
