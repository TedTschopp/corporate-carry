<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .bar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--hairline); }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: -0.015em; font-size: 15px; }
  .logo-mark { width: 26px; height: 26px; background: var(--ink); color: var(--bg); display: grid; place-items: center; font-family: var(--font-mono); font-size: 12px; font-weight: 600; border-radius: 2px; }
  .nav { display: flex; gap: 4px; justify-content: center; }
  .nav a { padding: 7px 13px; border-radius: 999px; font-size: 13px; color: var(--ink-2); }
  .nav a.active { background: var(--ink); color: var(--bg); }
  .util { display: flex; justify-content: flex-end; gap: 8px; align-items: center; }
  .iconbtn { width: 32px; height: 32px; border-radius: 999px; border: 1px solid var(--hairline); background: transparent; display: grid; place-items: center; color: var(--ink-2); }
  .btn-sm { padding: 6px 12px; border-radius: 999px; border: 1px solid var(--hairline); font-size: 12px; color: var(--ink); }
  .i { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style></head>
<body>
<div class="card card--tight">
  <div class="eyebrow"><span class="num">§</span> Site header &amp; nav</div>
  <div class="bar">
    <div class="logo">
      <div class="logo-mark">CC</div>
      <span>Corporate Carry</span>
    </div>
    <nav class="nav">
      <a class="active">Home</a>
      <a>Backpack</a>
      <a>Desk</a>
      <a>Travel</a>
      <a>Meetings</a>
      <a>Gift Guides</a>
    </nav>
    <div class="util">
      <button class="iconbtn"><svg class="i" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></button>
      <button class="btn-sm">Subscribe</button>
    </div>
  </div>
  <div class="note">Three-column header: logo · centered nav · utility row. Active item is a black pill. Sticky on scroll with backdrop blur.</div>
</div>
</body></html>
