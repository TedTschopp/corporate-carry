<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .r { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .r .box { width: 100%; height: 80px; background: var(--paper); border: 1px solid var(--hairline); }
  .r .nm { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink); letter-spacing: 0.02em; }
  .r .v { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); }
</style></head>
<body>
<div class="card card--tight">
  <div class="eyebrow"><span class="num">§</span> Border radii</div>
  <div class="grid">
    <div class="r"><div class="box" style="border-radius: 4px;"></div><div class="nm">radius-sm</div><div class="v">4px · chips, stamps</div></div>
    <div class="r"><div class="box" style="border-radius: 8px;"></div><div class="nm">radius</div><div class="v">8px · small components</div></div>
    <div class="r"><div class="box" style="border-radius: 12px;"></div><div class="nm">radius-lg</div><div class="v">12px · cards, surfaces</div></div>
    <div class="r"><div class="box" style="border-radius: 999px;"></div><div class="nm">pill</div><div class="v">999px · buttons, nav</div></div>
  </div>
  <div class="note">Cards default to 12px. Buttons and nav are always full pills. Stamped labels on placeholders use 2–4px to read as printed.</div>
</div>
</body></html>
