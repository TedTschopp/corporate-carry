<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .band { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid var(--hairline); border-radius: 12px; background: var(--paper); overflow: hidden; }
  .item { padding: 20px 22px; border-right: 1px solid var(--hairline); }
  .item:last-child { border-right: none; }
  .n { font-size: 34px; letter-spacing: -0.025em; font-weight: 600; line-height: 1; margin-bottom: 6px; color: var(--ink); }
  .n .u { font-size: 14px; color: var(--ink-soft); font-weight: 500; margin-left: 2px; }
  .l { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); }
</style></head>
<body>
<div class="card card--tight">
  <div class="eyebrow"><span class="num">§</span> Stat band</div>
  <div class="band">
    <div class="item"><div class="n">14<span class="u">cities</span></div><div class="l">Tested in</div></div>
    <div class="item"><div class="n">278<span class="u">days</span></div><div class="l">Duration</div></div>
    <div class="item"><div class="n">7<span class="u">items</span></div><div class="l">Final kit</div></div>
    <div class="item"><div class="n">4.1<span class="u">kg</span></div><div class="l">Loaded weight</div></div>
  </div>
  <div class="note">Used in editorial to make a quantitative claim feel earned. Numbers are display-weight Geist; units &amp; labels are mono.</div>
</div>
</body></html>
