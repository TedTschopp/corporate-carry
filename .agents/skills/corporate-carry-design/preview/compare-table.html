<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .compare { border: 1px solid var(--hairline); border-radius: 12px; background: var(--paper); overflow: hidden; }
  .compare__head { padding: 14px 18px; border-bottom: 1px solid var(--hairline); background: var(--surface); display: flex; justify-content: space-between; align-items: center; }
  .compare__head h3 { font-size: 14px; letter-spacing: -0.015em; margin: 0; font-weight: 600; }
  .compare__head .k { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 18px; border-bottom: 1px solid var(--hairline); font-size: 12.5px; }
  th { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); font-weight: 500; background: var(--surface); }
  tr:last-child td { border-bottom: none; }
  td.name { font-weight: 500; }
  td.mono { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-soft); }
  td.score { font-family: var(--font-mono); color: var(--accent-2); font-weight: 500; }
</style></head>
<body>
<div class="card card--tight">
  <div class="eyebrow"><span class="num">§</span> Compare table</div>
  <div class="compare">
    <div class="compare__head"><h3>Quick compare — Tier 1 power &amp; audio</h3><span class="k">Tested Mar–May 2026</span></div>
    <table>
      <thead><tr><th>Item</th><th>Weight</th><th>Best for</th><th>Score</th></tr></thead>
      <tbody>
        <tr><td class="name">Anker 735 Nano II — 65W</td><td class="mono">95 g</td><td>Daily office</td><td class="score">9.4</td></tr>
        <tr><td class="name">Anker Prime 20K Power Bank</td><td class="mono">348 g</td><td>Client visits</td><td class="score">9.1</td></tr>
        <tr><td class="name">Sony WH-1000XM5</td><td class="mono">250 g</td><td>Open office</td><td class="score">9.3</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body></html>
