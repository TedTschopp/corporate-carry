<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .ph { aspect-ratio: 16/10; background-color: var(--bg-soft); background-image: repeating-linear-gradient(135deg, transparent 0 11px, rgba(26,22,20,0.06) 11px 12px); border: 1px solid var(--hairline); border-radius: 12px; display: grid; place-items: center; }
  .ph__lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); padding: 4px 8px; background: var(--bg); border: 1px solid var(--hairline); border-radius: 2px; }
  .meta-row { display: flex; gap: 10px; align-items: center; margin-top: 14px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); }
  .chip { padding: 3px 8px; border-radius: 999px; background: var(--accent-tint); color: var(--accent-2); display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 5px; height: 5px; border-radius: 999px; background: currentColor; }
  h3 { font-size: 22px; letter-spacing: -0.02em; line-height: 1.1; margin: 10px 0 8px; }
  p { font-size: 13px; color: var(--ink-soft); line-height: 1.5; margin: 0; }
</style></head>
<body>
<div class="card card--tight">
  <div class="eyebrow"><span class="num">§</span> Article card · feature variant</div>
  <div class="ph"><span class="ph__lbl">editorial · hero shot</span></div>
  <div class="meta-row">
    <span class="chip"><span class="dot"></span> Feature</span>
    <span>Backpack</span>
    <span>·</span>
    <span>12 min read</span>
  </div>
  <h3>The hybrid worker's backpack setup, tested across 14 cities.</h3>
  <p>What 9 months of train rides, client offices, hotel desks, and one regrettable layover taught us about the bag that actually earns its straps.</p>
</div>
</body></html>
