<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% if page.url == "/" %}
  <title>{{ site.title }} — Everyday carry for the modern professional</title>
  {% else %}
  <title>{{ page.title }} — {{ site.title }}</title>
  {% endif %}
  <meta name="description" content="{{ page.dek | default: page.description | default: site.description | strip_html | escape }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
</head>
<body data-screen-label="{{ page.screen_label | default: page.title | default: site.title | escape }}">
  {% include header.html %}
  {{ content }}
  {% include footer.html %}
  {% include tweaks-scripts.html %}
</body>
</html>
